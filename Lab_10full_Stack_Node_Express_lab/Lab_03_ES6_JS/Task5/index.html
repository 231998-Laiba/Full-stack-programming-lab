<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Catalog - Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Product Catalog (Using Map)</h2>

    <div class="actions">
        <input type="number" id="searchId" placeholder="Enter Product ID">
        <button onclick="searchProduct()">Search</button>
        <button onclick="deleteProduct()">Delete</button>
    </div>

    <div class="result" id="productList"></div>
    <div class="total" id="totalProducts"></div>
</div>

<script src="script.js"></script>
</body>
</html>
