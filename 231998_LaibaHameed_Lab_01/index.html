<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Renewal Form</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<!-- Header with Logo -->
<header class="text-center p-3 bg-dark text-white">
  <img src="logo.png" alt="Talyllyn Railway Logo" class="logo mb-2">
  <h1>Talyllyn Railway Membership Renewal</h1>
</header>

<!-- Banner Image 
<div class="banner">
  <img src="banner.jpg" alt="Railway Banner" class="img-fluid w-100">
</div>--->

<div class="container mt-4">
  <h2 class="text-center mb-4">Set up Direct Debit for Membership Renewal</h2>
  <form id="membershipForm">
    
    <!-- Step 1: Basic Info -->
    <div class="form-step">
      <h4>Your Basic Info</h4>
      <div class="mb-3">
        <label class="form-label">Title *</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">First Name(s) *</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Last Name *</label>
        <input type="text" class="form-control" required>
      </div>
      <button type="button" class="btn btn-primary next-step">Next</button>
    </div>

    <!-- Step 2: Contact Details -->
    <div class="form-step d-none">
      <h4>Your Contact Details</h4>
      <div class="mb-3">
        <label class="form-label">Contact Number *</label>
        <input type="tel" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Alternative Contact Number</label>
        <input type="tel" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address *</label>
        <input type="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Email Address *</label>
        <input type="email" class="form-control" required>
      </div>
      <button type="button" class="btn btn-secondary prev-step">Back</button>
      <button type="button" class="btn btn-primary next-step">Next</button>
    </div>

    <!-- Step 3: Account Address -->
    <div class="form-step d-none">
      <h4>Your Account Address</h4>
      <div class="mb-3">
        <label class="form-label">Postcode</label>
        <input type="text" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Address Line 1 *</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Address Line 2</label>
        <input type="text" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Town *</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">County</label>
        <input type="text" class="form-control">
      </div>
      <button type="button" class="btn btn-secondary prev-step">Back</button>
      <button type="button" class="btn btn-primary next-step">Next</button>
    </div>

    <!-- Step 4: Bank Details -->
    <div class="form-step d-none">
      <h4>Your Bank Details</h4>
      <div class="mb-3">
        <label class="form-label">Account Holder Name *</label>
        <input type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Sort Code *</label>
        <div class="d-flex gap-2">
          <input type="text" class="form-control" maxlength="2" required>
          <input type="text" class="form-control" maxlength="2" required>
          <input type="text" class="form-control" maxlength="2" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Account Number *</label>
        <input type="text" class="form-control" required>
      </div>
      <button type="button" class="btn btn-secondary prev-step">Back</button>
      <button type="submit" class="btn btn-success">Check Out</button>
    </div>

  </form>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
