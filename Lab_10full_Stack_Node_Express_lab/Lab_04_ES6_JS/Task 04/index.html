<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tabbed Content with Smooth Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>Tabbed Navigation</h2>

        <div class="tabs">
            <button class="tab-btn active" data-target="#tab1">Home</button>
            <button class="tab-btn" data-target="#tab2">About</button>
            <button class="tab-btn" data-target="#tab3">Services</button>
            <button class="tab-btn" data-target="#tab4">Contact</button>
        </div>

        <div class="content">

            <div id="tab1" class="tab-content">
                <h3>Home</h3>
                <p>Welcome to our website. This is the home section.</p>
            </div>

            <div id="tab2" class="tab-content">
                <h3>About</h3>
                <p>We provide web development and design services.</p>
            </div>

            <div id="tab3" class="tab-content">
                <h3>Services</h3>
                <p>Our services include UI design, development, and consulting.</p>
            </div>

            <div id="tab4" class="tab-content">
                <h3>Contact</h3>
                <p>Email: info@example.com | Phone: 123-456-7890</p>
            </div>

        </div>

    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
